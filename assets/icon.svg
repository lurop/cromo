<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1c1813"/>
      <stop offset="100%" stop-color="#0c0a07"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0D77B"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A8842A"/>
    </linearGradient>
    <radialGradient id="goldShine" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#F0D77B"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A8842A"/>
    </radialGradient>
  </defs>

  <!-- Safe zone para maskable: padding interno -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Anillo dorado -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.45"/>

  <!-- Disco principal -->
  <circle cx="256" cy="256" r="132" fill="url(#goldShine)"/>

  <!-- "C" de Cromo en negro premium -->
  <text x="256" y="256"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Anton, 'Hanken Grotesk', sans-serif"
        font-weight="400"
        font-size="180"
        fill="#0c0a07"
        letter-spacing="6">C</text>

  <!-- Pequeño brillo -->
  <circle cx="206" cy="206" r="14" fill="#F4EEE3" opacity="0.35"/>
</svg>
