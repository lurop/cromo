<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0a07" />
  <meta name="description" content="Cromo — álbum de figuritas digital" />

  <title>Cromo</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
  <link rel="apple-touch-icon" href="./assets/icon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="app-frame">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <h1 class="brand-name">Cromo</h1>
      </div>
      <div class="header-stats">
        <div class="chip chip-streak" id="chip-streak" aria-label="Racha diaria"></div>
        <a class="chip chip-purp" id="chip-purp" href="#/tienda" aria-label="Purpurina · ir a tienda"></a>
        <button class="notif-bell" id="notif-bell" type="button" aria-label="Notificaciones"></button>
      </div>
    </header>

    <main id="view" class="app-view" role="main" aria-live="polite"></main>

    <nav class="app-tabs" role="navigation" aria-label="Navegación principal">
      <a class="tab" href="#/album" data-route="album">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h11l3 3v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm2 4v4l2-1.2L11 12V8H7z"/></svg>
        <span class="tab-label">Álbum</span>
      </a>
      <a class="tab" href="#/sobres" data-route="sobres">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1zm0 2v.4l8 5 8-5V8H4z"/></svg>
        <span class="tab-label">Sobres</span>
      </a>
      <a class="tab" href="#/cambios" data-route="cambios">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h11l-2.5-2.5L17 3l5 5-5 5-1.5-1.5L18 9H7V7zm10 10H6l2.5 2.5L7 21l-5-5 5-5 1.5 1.5L6 15h11v2z"/></svg>
        <span class="tab-label">Cambios</span>
      </a>
      <a class="tab" href="#/juego" data-route="juego">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7a5 5 0 0 0-5 5 5 5 0 0 0 5 5h10a5 5 0 0 0 5-5 5 5 0 0 0-5-5H7zm-1 4h2v1h1v2H8v1H6v-1H5v-2h1v-1zm10 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm-3 2a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/></svg>
        <span class="tab-label">Juego</span>
      </a>
      <a class="tab" href="#/perfil" data-route="perfil">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/></svg>
        <span class="tab-label">Perfil</span>
      </a>
    </nav>
  </div>

  <script defer src="./js/icons.js"></script>
  <script defer src="./js/data.js"></script>
  <script defer src="./js/jersey.js"></script>
  <script defer src="./js/state.js"></script>
  <script defer src="./js/pack.js"></script>
  <script defer src="./js/legends.js"></script>
  <script defer src="./js/notifications.js"></script>
  <script defer src="./js/anim.js"></script>
  <script defer src="./js/views/sticker.js"></script>
  <script defer src="./js/views/reveal.js"></script>
  <script defer src="./js/views/sobres.js"></script>
  <script defer src="./js/views/album.js"></script>
  <script defer src="./js/views/cambios.js"></script>
  <script defer src="./js/views/tienda.js"></script>
  <script defer src="./js/views/notifs.js"></script>
  <script defer src="./js/views/placeholder.js"></script>
  <script defer src="./js/onboarding.js"></script>
  <script defer src="./js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
